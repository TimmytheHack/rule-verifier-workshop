services:
  api:
    build:
      context: .
    ports:
      - "8001:8001"
    environment:
      DATA_ROOT: /data/uploaded_datasets
      OUTPUT_ROOT: /data/outputs
      UPLOAD_MAX_MB: "25"
      ENABLE_LLM: "false"
      AUTH_TOKENS_JSON: ${AUTH_TOKENS_JSON:?set AUTH_TOKENS_JSON before starting}
      TOOL_AUDIT_LOG_PATH: /data/outputs/tool_audit/audit.jsonl
      TOOL_AUDIT_MAX_BYTES: "5242880"
      TOOL_AUDIT_BACKUPS: "5"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:5173,http://localhost:5173}
    volumes:
      - szu_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  szu_data:
